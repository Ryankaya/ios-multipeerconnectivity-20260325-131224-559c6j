name: ios-multipeerconnectivity-20260325-131224-559c6j
options:
  createIntermediateGroups: true

targets:
  SignalBoard:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryankaya.signalboard20260325131224559c6j
        PRODUCT_NAME: SignalBoard
        SWIFT_VERSION: 5.0
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Signal Board
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: Signal Board uses Multipeer Connectivity to discover and sync nearby shared notes.
        INFOPLIST_KEY_NSBonjourServices:
          - _peer-board._tcp
          - _peer-board._udp
    scheme:
      testTargets:
        - SignalBoardTests

  SignalBoardTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: SignalBoard
    settings:
      base:
        SWIFT_VERSION: 5.0
        GENERATE_INFOPLIST_FILE: YES
